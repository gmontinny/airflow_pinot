# StarRocks Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: starrocks-fe
  namespace: airflow-datalake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: starrocks-fe
  template:
    metadata:
      labels:
        app: starrocks-fe
    spec:
      hostname: starrocks-fe
      containers:
        - name: fe
          image: starrocks/fe-ubuntu:latest
          command: ["/bin/bash", "-c", "/opt/starrocks/fe_entrypoint.sh starrocks-fe"]
          env:
            - name: HOST_TYPE
              value: FQDN
            - name: TZ
              value: America/Sao_Paulo
          ports:
            - containerPort: 8030
            - containerPort: 9020
            - containerPort: 9030
          volumeMounts:
            - name: fe-meta
              mountPath: /opt/starrocks/fe/meta
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8030
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: fe-meta
          persistentVolumeClaim:
            claimName: starrocks-fe-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: starrocks-fe
  namespace: airflow-datalake
spec:
  type: NodePort
  selector:
    app: starrocks-fe
  ports:
    - name: http
      port: 8030
      targetPort: 8030
      nodePort: 30030
    - name: rpc
      port: 9020
      targetPort: 9020
    - name: mysql
      port: 9030
      targetPort: 9030
      nodePort: 30930
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: starrocks-fe-pvc
  namespace: airflow-datalake
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
# StarRocks Backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: starrocks-be
  namespace: airflow-datalake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: starrocks-be
  template:
    metadata:
      labels:
        app: starrocks-be
    spec:
      hostname: starrocks-be
      containers:
        - name: be
          image: starrocks/be-ubuntu:latest
          command: ["/bin/bash", "-c", "sleep 15 && /opt/starrocks/be_entrypoint.sh starrocks-fe"]
          env:
            - name: HOST_TYPE
              value: FQDN
            - name: TZ
              value: America/Sao_Paulo
          ports:
            - containerPort: 8040
            - containerPort: 9050
          volumeMounts:
            - name: be-storage
              mountPath: /opt/starrocks/be/storage
      volumes:
        - name: be-storage
          persistentVolumeClaim:
            claimName: starrocks-be-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: starrocks-be
  namespace: airflow-datalake
spec:
  selector:
    app: starrocks-be
  ports:
    - name: http
      port: 8040
    - name: heartbeat
      port: 9050
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: starrocks-be-pvc
  namespace: airflow-datalake
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
# Job: registra o BE no FE
apiVersion: batch/v1
kind: Job
metadata:
  name: starrocks-add-be
  namespace: airflow-datalake
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: add-be
          image: mysql:8.0
          command:
            - /bin/sh
            - -c
            - |
              echo "Aguardando FE e BE..."
              sleep 45
              mysql -h starrocks-fe -P 9030 -u root -e \
                "ALTER SYSTEM ADD BACKEND 'starrocks-be:9050';" 2>/dev/null
              echo "BE registration attempted"
              sleep 10
              mysql -h starrocks-fe -P 9030 -u root -e "SHOW BACKENDS\G"

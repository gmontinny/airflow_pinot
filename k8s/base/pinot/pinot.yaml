# Pinot ZooKeeper
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pinot-zookeeper
  namespace: airflow-datalake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pinot-zookeeper
  template:
    metadata:
      labels:
        app: pinot-zookeeper
    spec:
      containers:
        - name: zookeeper
          image: zookeeper:3.9
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
          ports:
            - containerPort: 2181
---
apiVersion: v1
kind: Service
metadata:
  name: pinot-zookeeper
  namespace: airflow-datalake
spec:
  selector:
    app: pinot-zookeeper
  ports:
    - port: 2181
---
# Pinot Controller
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pinot-controller
  namespace: airflow-datalake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pinot-controller
  template:
    metadata:
      labels:
        app: pinot-controller
    spec:
      containers:
        - name: controller
          image: apachepinot/pinot:latest
          command: ["StartController", "-zkAddress", "pinot-zookeeper:2181"]
          env:
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m"
          ports:
            - containerPort: 9000
          volumeMounts:
            - name: controller-data
              mountPath: /tmp/data/PinotController
      volumes:
        - name: controller-data
          persistentVolumeClaim:
            claimName: pinot-controller-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: pinot-controller
  namespace: airflow-datalake
spec:
  type: NodePort
  selector:
    app: pinot-controller
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30010
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pinot-controller-pvc
  namespace: airflow-datalake
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
# Pinot Broker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pinot-broker
  namespace: airflow-datalake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pinot-broker
  template:
    metadata:
      labels:
        app: pinot-broker
    spec:
      containers:
        - name: broker
          image: apachepinot/pinot:latest
          command: ["StartBroker", "-zkAddress", "pinot-zookeeper:2181"]
          env:
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m"
          ports:
            - containerPort: 8099
---
apiVersion: v1
kind: Service
metadata:
  name: pinot-broker
  namespace: airflow-datalake
spec:
  selector:
    app: pinot-broker
  ports:
    - port: 8099
---
# Pinot Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pinot-server
  namespace: airflow-datalake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pinot-server
  template:
    metadata:
      labels:
        app: pinot-server
    spec:
      containers:
        - name: server
          image: apachepinot/pinot:latest
          command: ["StartServer", "-zkAddress", "pinot-zookeeper:2181"]
          env:
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m"
          ports:
            - containerPort: 8098
          volumeMounts:
            - name: server-data
              mountPath: /tmp/data/PinotServer
      volumes:
        - name: server-data
          persistentVolumeClaim:
            claimName: pinot-server-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: pinot-server
  namespace: airflow-datalake
spec:
  selector:
    app: pinot-server
  ports:
    - port: 8098
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pinot-server-pvc
  namespace: airflow-datalake
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi

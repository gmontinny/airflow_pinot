# MinIO
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: airflow-datalake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio
          command: ["server", "--console-address", ":9001", "/data"]
          env:
            - name: MINIO_ROOT_USER
              value: minioadmin
            - name: MINIO_ROOT_PASSWORD
              value: minioadmin
            - name: MINIO_REGION
              value: us-east-1
          ports:
            - containerPort: 9000
            - containerPort: 9001
          volumeMounts:
            - name: minio-data
              mountPath: /data
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: airflow-datalake
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30901
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: airflow-datalake
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
# Spark Connect
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-connect
  namespace: airflow-datalake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-connect
  template:
    metadata:
      labels:
        app: spark-connect
    spec:
      containers:
        - name: spark
          image: apache/spark:4.0.1
          command:
            - /opt/spark/sbin/start-connect-server.sh
            - --packages
            - org.apache.spark:spark-sql-kafka-0-10_2.13:4.0.1,org.apache.hadoop:hadoop-aws:3.3.6,com.amazonaws:aws-java-sdk-bundle:1.12.262,com.mysql:mysql-connector-j:8.0.33
            - --conf
            - spark.hadoop.fs.s3a.endpoint=http://minio:9000
            - --conf
            - spark.hadoop.fs.s3a.access.key=minioadmin
            - --conf
            - spark.hadoop.fs.s3a.secret.key=minioadmin
            - --conf
            - spark.hadoop.fs.s3a.path.style.access=true
            - --conf
            - spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
            - --conf
            - spark.connect.grpc.binding.port=15002
          env:
            - name: SPARK_NO_DAEMONIZE
              value: "true"
          ports:
            - containerPort: 15002
            - containerPort: 4040
---
apiVersion: v1
kind: Service
metadata:
  name: spark-connect
  namespace: airflow-datalake
spec:
  selector:
    app: spark-connect
  ports:
    - name: grpc
      port: 15002
    - name: ui
      port: 4040

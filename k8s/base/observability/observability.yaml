# Elasticsearch
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: airflow-datalake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          ports:
            - containerPort: 9200
          volumeMounts:
            - name: es-data
              mountPath: /usr/share/elasticsearch/data
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: es-data
          persistentVolumeClaim:
            claimName: elasticsearch-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: airflow-datalake
spec:
  selector:
    app: elasticsearch
  ports:
    - port: 9200
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-pvc
  namespace: airflow-datalake
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
# Logstash
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: airflow-datalake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.11.0
          env:
            - name: LS_JAVA_OPTS
              value: "-Xms256m -Xmx256m"
          ports:
            - containerPort: 5000
            - containerPort: 9600
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: airflow-datalake
spec:
  selector:
    app: logstash
  ports:
    - name: input
      port: 5000
    - name: api
      port: 9600
---
# Neo4j
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: airflow-datalake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.15.0
          env:
            - name: NEO4J_AUTH
              value: neo4j/password
          ports:
            - containerPort: 7474
            - containerPort: 7687
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
      volumes:
        - name: neo4j-data
          persistentVolumeClaim:
            claimName: neo4j-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: airflow-datalake
spec:
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
    - name: bolt
      port: 7687
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-pvc
  namespace: airflow-datalake
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
# Superset
apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset
  namespace: airflow-datalake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: superset
  template:
    metadata:
      labels:
        app: superset
    spec:
      containers:
        - name: superset
          image: apache/superset:latest
          command:
            - /bin/sh
            - -c
            - |
              superset db upgrade &&
              superset fab create-admin --username admin --firstname Superset --lastname Admin --password admin --email admin@superset.com &&
              superset init &&
              superset run -h 0.0.0.0 -p 8088 --with-threads --reload --debugger
          env:
            - name: SUPERSET_SECRET_KEY
              value: "12345ab@"
          ports:
            - containerPort: 8088
          volumeMounts:
            - name: superset-home
              mountPath: /app/superset_home
      volumes:
        - name: superset-home
          persistentVolumeClaim:
            claimName: superset-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: superset
  namespace: airflow-datalake
spec:
  type: NodePort
  selector:
    app: superset
  ports:
    - port: 8088
      targetPort: 8088
      nodePort: 30088
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: superset-pvc
  namespace: airflow-datalake
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
